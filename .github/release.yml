# Configures GitHub's automatically-generated release notes (used by
# `gh release create --generate-notes`). PRs are grouped by label.
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
    categories:
        - title: "✨ Features"
          labels:
              - "enhancement"
              - "feature"

        - title: "🐛 Fixes"
          labels:
              - "bug"
              - "fix"

        - title: "⬆️ Dependency Updates"
          labels:
              - "dependencies"

        - title: "🔧 Changed"
          labels:
              - "*"
